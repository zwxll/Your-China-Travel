<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese footprint - 启动页</title>
<style>
  /* ===== 全局重置与全屏 ===== */
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; }
  body{
    overflow:hidden;                                  /* 全屏无滚动 */
    /* 深空背景：径向渐变营造宇宙深邃感 */
    background:radial-gradient(ellipse at center, #0a0e1a 0%, #000000 70%);
    font-family:'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }

  /* ===== 棱镜光流动态背景（z-index:2，Canvas 2D 流动光线粒子，file://下也能显示） ===== */
  /* 放在地球之上才能让光效明显可见（地球canvas会遮挡下方图层） */
  #prism-bg{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:2;                                        /* 地球(z-index:1)之上、标题按钮(z-index:10)之下 */
    pointer-events:none;                              /* 不拦截鼠标，让地球可拖拽 */
    overflow:hidden;
    background:transparent;
  }
  #prism-bg canvas{display:block;width:100%;height:100%;mix-blend-mode:screen;}

  /* ===== 中层：3D 地球容器（z-index:1，可交互拖拽缩放） ===== */
  #globeViz{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:1;
    pointer-events:auto;                              /* 允许鼠标拖拽旋转与滚轮缩放 */
  }
  #globeViz canvas{width:100%!important;height:100%!important;display:block;}

  /* ===== 上层：标题 + 按钮悬浮层（z-index:10，整体穿透） ===== */
  .launch-overlay{
    position:fixed;
    inset:0;
    z-index:10;
    pointer-events:none;                              /* 整体穿透，让鼠标事件落到地球 */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;                           /* 垂直居中：标题与按钮位于页面正中 */
  }

  /* ===== 标题双层结构 ===== */
  /* 外层包裹：relative 定位，内含发光层与扫光层 */
  .launch-title-wrap{
    position:relative;
    display:inline-block;
    line-height:1.1;
  }
  /* 标题通用字体属性（两层共用，确保完全对齐） */
  .launch-title,
  .launch-title-glow{
    font-size:clamp(2.5rem, 6vw, 5rem);              /* 全屏自适应 */
    font-weight:800;
    letter-spacing:0.08em;
    margin:0;
    white-space:nowrap;
  }
  /* 发光层（绝对定位，位于底层）：白色文字 + 微光 text-shadow */
  .launch-title-glow{
    position:absolute;
    inset:0;
    color:#ffffff;
    text-shadow:0 0 20px rgba(186,230,253,0.6),
               0 0 40px rgba(56,189,248,0.3);
    pointer-events:none;
  }
  /* 扫光层（位于上层）：background-clip:text 实现 shiny 扫光 */
  .launch-title{
    position:relative;
    background:linear-gradient(135deg,
      #ffffff 0%,
      #ffffff 42%,
      #bae6fd 50%,
      #ffffff 58%,
      #ffffff 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;                                /* 文字透明，仅显示渐变扫光 */
    animation:shinySweep 6s ease-in-out infinite;
  }
  /* shiny 扫光动画：渐变位置循环移动 */
  @keyframes shinySweep{
    0%   { background-position:150% 0; }
    26.7%{ background-position:-50% 0; }
    50%  { background-position:-50% 0; }
    76.7%{ background-position:150% 0; }
    100% { background-position:150% 0; }
  }

  /* ===== 副标题 ===== */
  .launch-subtitle{
    font-size:clamp(0.9rem, 1.8vw, 1.3rem);
    color:rgba(186,230,253,0.7);
    letter-spacing:0.3em;
    margin-top:12px;
    font-weight:400;
    text-align:center;
  }

  /* ===== 按钮：参考照片风格——深色玻璃底 + 暖金白文字 + 闪光图标 + 箭头 ===== */
  .launch-btn{
    pointer-events:auto;                              /* 按钮单独捕获点击（穿透层中唯一可交互元素） */
    position:relative;
    overflow:hidden;
    margin-top:56px;                                  /* 距副标题留白 */
    padding:16px 52px;
    border-radius:30px;                               /* 大圆角胶囊形，参考照片风格 */
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    text-align:center;
    letter-spacing:3px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    /* 深色玻璃质感背景 */
    background:rgba(10,12,20,0.62);
    backdrop-filter:blur(10px) saturate(150%);
    -webkit-backdrop-filter:blur(10px) saturate(150%);
    color:#fff6e0;                                    /* 暖金白色文字，参考照片 */
    border:1px solid rgba(255,225,160,0.45);          /* 暖金边框 */
    box-shadow:0 4px 18px rgba(0,0,0,0.5),
               0 0 14px rgba(255,210,120,0.15),
               inset 0 0 14px rgba(255,210,120,0.08);
    transition:transform .25s cubic-bezier(.4,0,.2,1),
               box-shadow .25s ease,
               border-color .25s ease;
  }
  /* 闪光图标 */
  .launch-btn .sparkle{
    font-size:18px;
    line-height:1;
    filter:drop-shadow(0 0 4px rgba(255,225,160,0.7));
  }
  /* 箭头 */
  .launch-btn .arrow{
    margin-left:4px;
    opacity:0.85;
  }
  /* 底部径向高光（增强镜面感） */
  .launch-btn::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:inherit;
    background:radial-gradient(120% 80% at 50% 120%,
      rgba(255,210,120,0.18),
      transparent 60%);
    opacity:.7;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  /* 镜面扫光条：斜向移动的高光带 */
  .launch-btn::after{
    content:'';
    position:absolute;
    top:0;
    left:-60%;
    width:50%;
    height:100%;
    background:linear-gradient(105deg,
      transparent 0%,
      rgba(255,235,190,0) 30%,
      rgba(255,235,190,0.55) 50%,
      rgba(255,235,190,0) 70%,
      transparent 100%);
    transform:skewX(-18deg);
    pointer-events:none;
    animation:btnSweep 3.5s ease-in-out infinite;
  }
  @keyframes btnSweep{
    0%  { left:-60%; }
    55% { left:120%; }
    100%{ left:120%; }
  }
  /* hover：上浮 + 加强发光 */
  .launch-btn:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 8px 26px rgba(0,0,0,0.55),
               0 0 22px rgba(255,210,120,0.35),
               inset 0 0 18px rgba(255,210,120,0.14);
    border-color:rgba(255,235,190,0.85);
  }
  .launch-btn:hover::before{ opacity:1; }
  .launch-btn:active{ transform:translateY(0) scale(0.98); }
</style>
</head>
<body>

  <!-- ========== 棱镜光流动态背景（z-index:2，Canvas 2D 流动光线粒子） ========== -->
  <div id="prism-bg">
    <canvas id="prism-canvas"></canvas>
  </div>

  <!-- ========== 中层：globe.gl 3D 云层地球（z-index:1，全屏铺满，可交互） ========== -->
  <div id="globeViz"></div>

  <!-- ========== 上层：标题 + 按钮（z-index:10，整体穿透，按钮单独可点） ========== -->
  <div class="launch-overlay">
    <!-- 标题双层：发光层 + 扫光层 -->
    <div class="launch-title-wrap">
      <h1 class="launch-title-glow">Chinese footprint</h1>
      <h1 class="launch-title">Chinese footprint</h1>
    </div>
    <!-- 副标题 -->
    <p class="launch-subtitle">点亮你走过的每一座城市</p>
    <!-- 启动按钮：闪光图标 + 文字 + 箭头，参考照片风格 -->
    <button class="launch-btn" id="startBtn">
      <span class="sparkle">✦</span>
      <span>开始记录</span>
      <span class="arrow">→</span>
    </button>
  </div>

  <!-- ========== globe.gl 依赖（UMD，内部已打包 three.js，暴露全局 Globe） ========== -->
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>

  <!-- ========== 棱镜光流背景说明 ==========
       用 Canvas 2D 实现流动光线 + 粒子 + 极光波动效果：
       - 多条流动光带沿屏幕缓慢移动，模拟棱镜折射光线
       - 漂浮粒子缓慢上升，增加空间纵深感
       - 底部极光波动，营造科技氛围
       Canvas 2D 性能好，file:// 下可用，不占用 WebGL 资源，地球拖拽流畅。 -->

  <!-- ========== 棱镜光流 Canvas 2D 动画 ========== -->
  <script>
    (function(){
      const canvas = document.getElementById('prism-canvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      let W = 0, H = 0;

      /* ---------- 尺寸适配 ---------- */
      function resize(){
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      /* ---------- 流动光带：多条曲线沿屏幕移动 ---------- */
      const beams = [];
      for(let i = 0; i < 6; i++){
        beams.push({
          y: Math.random() * H,                        /* 基准 y 位置 */
          amp: 60 + Math.random() * 120,               /* 波动幅度 */
          freq: 0.003 + Math.random() * 0.004,         /* 波动频率 */
          speed: 0.15 + Math.random() * 0.35,          /* 移动速度 */
          phase: Math.random() * Math.PI * 2,          /* 相位偏移 */
          hue: 190 + Math.random() * 40,               /* 色相：青蓝~天蓝 */
          alpha: 0.08 + Math.random() * 0.12,          /* 透明度 */
          thick: 1.5 + Math.random() * 2.5             /* 线宽 */
        });
      }

      /* ---------- 漂浮粒子：缓慢上升的光点 ---------- */
      const particles = [];
      for(let i = 0; i < 50; i++){
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 0.5 + Math.random() * 1.8,               /* 半径 */
          vy: 0.15 + Math.random() * 0.4,             /* 上升速度 */
          vx: (Math.random() - 0.5) * 0.2,            /* 水平漂移 */
          alpha: 0.3 + Math.random() * 0.5,           /* 透明度 */
          hue: 190 + Math.random() * 50,              /* 色相 */
          twinkle: Math.random() * Math.PI * 2         /* 闪烁相位 */
        });
      }

      /* ---------- 底部极光波动 ---------- */
      const auroras = [];
      for(let i = 0; i < 3; i++){
        auroras.push({
          baseY: H * (0.7 + i * 0.08),                /* 基准位置 */
          amp: 40 + Math.random() * 60,
          freq: 0.002 + Math.random() * 0.003,
          speed: 0.2 + Math.random() * 0.3,
          phase: Math.random() * Math.PI * 2,
          hue: 180 + i * 15,
          alpha: 0.06 + i * 0.02
        });
      }

      let t = 0;

      /* ---------- 渲染循环 ---------- */
      function render(){
        t += 0.016;
        ctx.clearRect(0, 0, W, H);

        /* 1. 底部极光波动（多层正弦波填充） */
        auroras.forEach(a => {
          ctx.beginPath();
          ctx.moveTo(0, H);
          for(let x = 0; x <= W; x += 8){
            const y = a.baseY
              + Math.sin(x * a.freq + t * a.speed + a.phase) * a.amp
              + Math.sin(x * a.freq * 2.3 + t * a.speed * 1.5) * a.amp * 0.4;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(W, H);
          ctx.closePath();
          const grad = ctx.createLinearGradient(0, a.baseY - a.amp, 0, H);
          grad.addColorStop(0, `hsla(${a.hue},80%,60%,${a.alpha})`);
          grad.addColorStop(1, `hsla(${a.hue},80%,40%,0)`);
          ctx.fillStyle = grad;
          ctx.fill();
        });

        /* 2. 流动光带（贝塞尔曲线，带辉光） */
        beams.forEach(b => {
          ctx.beginPath();
          for(let x = 0; x <= W; x += 6){
            const y = b.y
              + Math.sin(x * b.freq + t * b.speed + b.phase) * b.amp
              + Math.sin(x * b.freq * 1.7 + t * b.speed * 0.8) * b.amp * 0.35;
            if(x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          /* 辉光层（粗线低透明度） */
          ctx.strokeStyle = `hsla(${b.hue},85%,65%,${b.alpha * 0.4})`;
          ctx.lineWidth = b.thick * 4;
          ctx.lineCap = 'round';
          ctx.stroke();
          /* 主线（细线高透明度） */
          ctx.strokeStyle = `hsla(${b.hue},90%,72%,${b.alpha})`;
          ctx.lineWidth = b.thick;
          ctx.stroke();
        });

        /* 3. 漂浮粒子（带闪烁） */
        particles.forEach(p => {
          p.y -= p.vy;                                 /* 上升 */
          p.x += p.vx;                                 /* 水平漂移 */
          if(p.y < -10){ p.y = H + 10; p.x = Math.random() * W; }
          if(p.x < -10) p.x = W + 10;
          if(p.x > W + 10) p.x = -10;
          const flicker = 0.5 + Math.sin(t * 2 + p.twinkle) * 0.5;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},85%,70%,${p.alpha * flicker})`;
          ctx.fill();
          /* 粒子辉光 */
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},85%,70%,${p.alpha * flicker * 0.15})`;
          ctx.fill();
        });

        requestAnimationFrame(render);
      }
      render();
    })();
  </script>

  <!-- ========== 主逻辑：地球 / 云层 / 光照 / 自转 / 跳转 ==========
       用普通 <script>（非 type=module），file:// 双击打开也能正常加载。
       globe.gl UMD 先加载并初始化地球（用内部打包的 three），
       再动态加载 three.js UMD 供云层代码使用，避免 ES module 在 file:// 下被 CORS 阻止。 -->
  <script>
    /* ---------- 等待 globe.gl 加载完成并初始化地球 ---------- */
    function initGlobe(){
      if(typeof Globe==='undefined'){
        setTimeout(initGlobe,50);
        return;
      }

      /* ---------- 地球初始化（纹理 + 凹凸贴图） ---------- */
      const world = new Globe(document.getElementById('globeViz'), { animateIn: false })
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png');

      /* ---------- 全屏尺寸适配 ---------- */
      world.width(window.innerWidth).height(window.innerHeight);

      /* ---------- 地球自动缓慢自转 ---------- */
      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 0.35;

      /* ---------- 初始视角：完整全球视角 ----------
       * altitude 2.5 让地球完整显示在视口中，可看到整个地球。
       * 初始状态无任何区域高亮，地球缓慢自转。 */
      world.pointOfView({ lat: 20, lng: 105, altitude: 2.5 });

      /* ---------- 窗口尺寸变化时同步更新地球画布 ---------- */
      window.addEventListener('resize', () => {
        world.width(window.innerWidth).height(window.innerHeight);
      });

      /* ========== 「开始记录」按钮点击动画流程 ==========
       * 流程：停转 → 镜头过渡到中国(1.5s) → 跳转
       * 防重复点击：isAnimating 标志锁 */
      let isAnimating = false;

      document.getElementById('startBtn').addEventListener('click', () => {
        if(isAnimating) return;                        /* 动画进行中，忽略重复点击 */
        isAnimating = true;

        /* ① 停止地球默认自转 */
        world.controls().autoRotate = false;

        /* ② 镜头平滑过渡到中国全境（1.5秒缓动）
         * 中国经度 73~135，纬度 18~54，中心约 lat:36 lng:105
         * altitude 1.3 可完整展示中国版图，不裁切不偏移 */
        world.pointOfView({ lat: 36, lng: 105, altitude: 1.3 }, 1500);

        /* ③ 镜头过渡完成(1.5s)后，停留片刻让用户看清中国版图，再跳转 */
        setTimeout(() => {
          window.location.href = './index.html';
        }, 2800);  /* 1.5s 过渡 + 1.3s 停留 */
      });

      /* ---------- 动态加载 three.js UMD 供云层使用 ----------
       * globe.gl UMD 内部打包了 three.js 但不暴露全局 THREE。
       * 此处动态加载 three@0.149.0 UMD（最后稳定 UMD 版本），
       * 用于创建云层 Mesh/光照等。globe.gl 已初始化完毕，不受影响。 */
      function loadThreeScript(){
        if(typeof THREE!=='undefined'){ setupClouds(THREE); return; }
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js';
        s.onload=()=>setupClouds(THREE);
        s.onerror=()=>console.error('three.js UMD 加载失败，云层将不显示');
        document.head.appendChild(s);
      }

      /* ---------- 云层 + 补充光照（依赖 three.js） ---------- */
      function setupClouds(THREE){
        /* 补充光照：增强云层可见度与昼夜分界 */
        world.scene().add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1, 1, 1);
        world.scene().add(dirLight);

        /* 云层：独立球体包裹地球，独立旋转 */
        const CLOUDS_URLS = [
          'https://cdn.jsdelivr.net/gh/turban/webgl-earth@master/media/fair_clouds_4k.png',
          'https://raw.githubusercontent.com/turban/webgl-earth/master/media/fair_clouds_4k.png'
        ];
        const CLOUDS_ALT = 0.004;
        const CLOUDS_ROTATION_SPEED = -0.006;

        function loadClouds(urlIndex = 0) {
          if (urlIndex >= CLOUDS_URLS.length) return;
          new THREE.TextureLoader().load(
            CLOUDS_URLS[urlIndex],
            cloudsTexture => {
              const clouds = new THREE.Mesh(
                new THREE.SphereGeometry(world.getGlobeRadius() * (1 + CLOUDS_ALT), 75, 75),
                new THREE.MeshPhongMaterial({ map: cloudsTexture, transparent: true })
              );
              world.scene().add(clouds);
              (function rotateClouds() {
                clouds.rotation.y += CLOUDS_ROTATION_SPEED * Math.PI / 180;
                requestAnimationFrame(rotateClouds);
              })();
            },
            undefined,
            () => loadClouds(urlIndex + 1)
          );
        }
        loadClouds();
      }

      /* 地球初始化完成后，加载 three.js 用于云层 */
      loadThreeScript();
    }

    /* DOM 就绪后启动 */
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',initGlobe);
    }else{
      initGlobe();
    }
  </script>
</body>
</html>
