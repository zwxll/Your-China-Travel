<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese footprint - 启动页</title>
<style>
  /* ===== 全局重置与全屏 ===== */
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; }
  body{
    overflow:hidden;                                  /* 全屏无滚动 */
    /* 深空背景：径向渐变营造宇宙深邃感 */
    background:radial-gradient(ellipse at center, #0a0e1a 0%, #000000 70%);
    font-family:'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }

  /* ===== 最底层：Prism 棱镜动态背景（z-index:0，全屏铺满，不拦截鼠标） ===== */
  #prism-bg{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:0;                                        /* 地球(z-index:1)之下、body深空之上 */
    pointer-events:none;                              /* 不拦截鼠标，让地球可拖拽 */
    overflow:hidden;
  }
  #prism-bg canvas{display:block;}

  /* ===== 中层：3D 地球容器（z-index:1，可交互拖拽缩放） ===== */
  #globeViz{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:1;
    pointer-events:auto;                              /* 允许鼠标拖拽旋转与滚轮缩放 */
  }
  #globeViz canvas{width:100%!important;height:100%!important;display:block;}

  /* ===== 上层：标题 + 按钮悬浮层（z-index:10，整体穿透） ===== */
  .launch-overlay{
    position:fixed;
    inset:0;
    z-index:10;
    pointer-events:none;                              /* 整体穿透，让鼠标事件落到地球 */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;                           /* 垂直居中：标题与按钮位于页面正中 */
  }

  /* ===== 标题双层结构 ===== */
  /* 外层包裹：relative 定位，内含发光层与扫光层 */
  .launch-title-wrap{
    position:relative;
    display:inline-block;
    line-height:1.1;
  }
  /* 标题通用字体属性（两层共用，确保完全对齐） */
  .launch-title,
  .launch-title-glow{
    font-size:clamp(2.5rem, 6vw, 5rem);              /* 全屏自适应 */
    font-weight:800;
    letter-spacing:0.08em;
    margin:0;
    white-space:nowrap;
  }
  /* 发光层（绝对定位，位于底层）：白色文字 + 微光 text-shadow */
  .launch-title-glow{
    position:absolute;
    inset:0;
    color:#ffffff;
    text-shadow:0 0 20px rgba(186,230,253,0.6),
               0 0 40px rgba(56,189,248,0.3);
    pointer-events:none;
  }
  /* 扫光层（位于上层）：background-clip:text 实现 shiny 扫光 */
  .launch-title{
    position:relative;
    background:linear-gradient(135deg,
      #ffffff 0%,
      #ffffff 42%,
      #bae6fd 50%,
      #ffffff 58%,
      #ffffff 100%);
    background-size:250% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;                                /* 文字透明，仅显示渐变扫光 */
    animation:shinySweep 6s ease-in-out infinite;
  }
  /* shiny 扫光动画：渐变位置循环移动 */
  @keyframes shinySweep{
    0%   { background-position:150% 0; }
    26.7%{ background-position:-50% 0; }
    50%  { background-position:-50% 0; }
    76.7%{ background-position:150% 0; }
    100% { background-position:150% 0; }
  }

  /* ===== 副标题 ===== */
  .launch-subtitle{
    font-size:clamp(0.9rem, 1.8vw, 1.3rem);
    color:rgba(186,230,253,0.7);
    letter-spacing:0.3em;
    margin-top:12px;
    font-weight:400;
    text-align:center;
  }

  /* ===== 按钮：参考照片风格——深色玻璃底 + 暖金白文字 + 闪光图标 + 箭头 ===== */
  .launch-btn{
    pointer-events:auto;                              /* 按钮单独捕获点击（穿透层中唯一可交互元素） */
    position:relative;
    overflow:hidden;
    margin-top:56px;                                  /* 距副标题留白 */
    padding:16px 52px;
    border-radius:30px;                               /* 大圆角胶囊形，参考照片风格 */
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    text-align:center;
    letter-spacing:3px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    /* 深色玻璃质感背景 */
    background:rgba(10,12,20,0.62);
    backdrop-filter:blur(10px) saturate(150%);
    -webkit-backdrop-filter:blur(10px) saturate(150%);
    color:#fff6e0;                                    /* 暖金白色文字，参考照片 */
    border:1px solid rgba(255,225,160,0.45);          /* 暖金边框 */
    box-shadow:0 4px 18px rgba(0,0,0,0.5),
               0 0 14px rgba(255,210,120,0.15),
               inset 0 0 14px rgba(255,210,120,0.08);
    transition:transform .25s cubic-bezier(.4,0,.2,1),
               box-shadow .25s ease,
               border-color .25s ease;
  }
  /* 闪光图标 */
  .launch-btn .sparkle{
    font-size:18px;
    line-height:1;
    filter:drop-shadow(0 0 4px rgba(255,225,160,0.7));
  }
  /* 箭头 */
  .launch-btn .arrow{
    margin-left:4px;
    opacity:0.85;
  }
  /* 底部径向高光（增强镜面感） */
  .launch-btn::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:inherit;
    background:radial-gradient(120% 80% at 50% 120%,
      rgba(255,210,120,0.18),
      transparent 60%);
    opacity:.7;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  /* 镜面扫光条：斜向移动的高光带 */
  .launch-btn::after{
    content:'';
    position:absolute;
    top:0;
    left:-60%;
    width:50%;
    height:100%;
    background:linear-gradient(105deg,
      transparent 0%,
      rgba(255,235,190,0) 30%,
      rgba(255,235,190,0.55) 50%,
      rgba(255,235,190,0) 70%,
      transparent 100%);
    transform:skewX(-18deg);
    pointer-events:none;
    animation:btnSweep 3.5s ease-in-out infinite;
  }
  @keyframes btnSweep{
    0%  { left:-60%; }
    55% { left:120%; }
    100%{ left:120%; }
  }
  /* hover：上浮 + 加强发光 */
  .launch-btn:hover{
    transform:translateY(-2px) scale(1.03);
    box-shadow:0 8px 26px rgba(0,0,0,0.55),
               0 0 22px rgba(255,210,120,0.35),
               inset 0 0 18px rgba(255,210,120,0.14);
    border-color:rgba(255,235,190,0.85);
  }
  .launch-btn:hover::before{ opacity:1; }
  .launch-btn:active{ transform:translateY(0) scale(0.98); }
</style>
</head>
<body>

  <!-- ========== 最底层：Prism 棱镜动态背景（z-index:0，透明 canvas，光效叠加在深空上） ========== -->
  <div id="prism-bg"></div>

  <!-- ========== 中层：globe.gl 3D 云层地球（z-index:1，全屏铺满，可交互） ========== -->
  <div id="globeViz"></div>

  <!-- ========== 上层：标题 + 按钮（z-index:10，整体穿透，按钮单独可点） ========== -->
  <div class="launch-overlay">
    <!-- 标题双层：发光层 + 扫光层 -->
    <div class="launch-title-wrap">
      <h1 class="launch-title-glow">Chinese footprint</h1>
      <h1 class="launch-title">Chinese footprint</h1>
    </div>
    <!-- 副标题 -->
    <p class="launch-subtitle">点亮你走过的每一座城市</p>
    <!-- 启动按钮：闪光图标 + 文字 + 箭头，参考照片风格 -->
    <button class="launch-btn" id="startBtn">
      <span class="sparkle">✦</span>
      <span>开始记录</span>
      <span class="arrow">→</span>
    </button>
  </div>

  <!-- ========== globe.gl 依赖（UMD，内部已打包 three.js，暴露全局 Globe） ========== -->
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>

  <!-- ========== Prism 棱镜动态背景 ==========
       基于 reactbits Prism 组件改造，用 ogl ES module 实现 GLSL fragment shader 棱镜光线追踪。
       rotate 模式：shader 内部 wobble 矩阵做动画，无需鼠标交互。
       canvas 透明，让 body 深空色透出，棱镜光效叠加在深空上（z-index:0）。
       注：ogl 为纯 ES module 包，需用 type="module" + import 加载。
       http/https 下正常工作；file:// 下 prism 不显示但地球仍正常（优雅降级）。 -->
  <script type="module">
    /* 动态 import ogl ESM（esm.sh 提供稳定 CDN ESM 转发） */
    let Renderer, Triangle, Program, Mesh;
    try {
      const ogl = await import('https://esm.sh/ogl@1.0.11');
      Renderer = ogl.Renderer; Triangle = ogl.Triangle;
      Program = ogl.Program; Mesh = ogl.Mesh;
    } catch(e) {
      console.warn('Prism 背景：ogl 加载失败，背景将不显示（地球不受影响）', e);
    }

    function initPrism(){
      if(!Renderer){ return; }  /* ogl 未加载则跳过 */

      const container = document.getElementById('prism-bg');
      if(!container) return;

      /* ---------- 参数（与 React 组件默认值一致） ---------- */
      const height = 3.5, baseWidth = 5.5, glow = 1, noise = 0.5;
      const transparent = true, scale = 3.6, hueShift = 0;
      const colorFrequency = 1, bloom = 1, timeScale = 0.5;
      const offset = { x: 0, y: 0 };

      const H = Math.max(0.001, height);
      const BW = Math.max(0.001, baseWidth);
      const BASE_HALF = BW * 0.5;
      const GLOW = Math.max(0.0, glow);
      const NOISE = Math.max(0.0, noise);
      const offX = offset.x, offY = offset.y;
      const SAT = transparent ? 1.5 : 1;
      const SCALE = Math.max(0.001, scale);
      const HUE = hueShift || 0;
      const CFREQ = Math.max(0.0, colorFrequency || 1);
      const BLOOM = Math.max(0.0, bloom || 1);
      const TS = Math.max(0, timeScale || 1);

      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const renderer = new Renderer({ dpr, alpha: transparent, antialias: false });
      const gl = renderer.gl;
      gl.disable(gl.DEPTH_TEST);
      gl.disable(gl.CULL_FACE);
      gl.disable(gl.BLEND);
      Object.assign(gl.canvas.style, {
        position: 'absolute', inset: '0', width: '100%', height: '100%', display: 'block'
      });
      container.appendChild(gl.canvas);

      /* ---------- 顶点着色器：全屏三角形位置直传 ---------- */
      const vertex = `
        attribute vec2 position;
        void main(){ gl_Position = vec4(position, 0.0, 1.0); }
      `;
      /* ---------- 片段着色器：3D 棱镜光线追踪（raymarching） ---------- */
      const fragment = `
        precision highp float;
        uniform vec2  iResolution;
        uniform float iTime;
        uniform float uHeight;
        uniform float uBaseHalf;
        uniform mat3  uRot;
        uniform int   uUseBaseWobble;
        uniform float uGlow;
        uniform vec2  uOffsetPx;
        uniform float uNoise;
        uniform float uSaturation;
        uniform float uScale;
        uniform float uHueShift;
        uniform float uColorFreq;
        uniform float uBloom;
        uniform float uCenterShift;
        uniform float uInvBaseHalf;
        uniform float uInvHeight;
        uniform float uMinAxis;
        uniform float uPxScale;
        uniform float uTimeScale;
        vec4 tanh4(vec4 x){ vec4 e2x = exp(2.0*x); return (e2x - 1.0) / (e2x + 1.0); }
        float rand(vec2 co){ return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453123); }
        float sdOctaAnisoInv(vec3 p){
          vec3 q = vec3(abs(p.x) * uInvBaseHalf, abs(p.y) * uInvHeight, abs(p.z) * uInvBaseHalf);
          float m = q.x + q.y + q.z - 1.0;
          return m * uMinAxis * 0.5773502691896258;
        }
        float sdPyramidUpInv(vec3 p){
          float oct = sdOctaAnisoInv(p);
          float halfSpace = -p.y;
          return max(oct, halfSpace);
        }
        mat3 hueRotation(float a){
          float c = cos(a), s = sin(a);
          mat3 W = mat3(0.299, 0.587, 0.114, 0.299, 0.587, 0.114, 0.299, 0.587, 0.114);
          mat3 U = mat3(0.701, -0.587, -0.114, -0.299, 0.413, -0.114, -0.300, -0.588, 0.886);
          mat3 V = mat3(0.168, -0.331, 0.500, 0.328, 0.035, -0.500, -0.497, 0.296, 0.201);
          return W + U * c + V * s;
        }
        void main(){
          vec2 f = (gl_FragCoord.xy - 0.5 * iResolution.xy - uOffsetPx) * uPxScale;
          float z = 5.0;
          float d = 0.0;
          vec3 p;
          vec4 o = vec4(0.0);
          float centerShift = uCenterShift;
          float cf = uColorFreq;
          mat2 wob = mat2(1.0);
          if (uUseBaseWobble == 1) {
            float t = iTime * uTimeScale;
            float c0 = cos(t + 0.0);
            float c1 = cos(t + 33.0);
            float c2 = cos(t + 11.0);
            wob = mat2(c0, c1, c2, c0);
          }
          const int STEPS = 100;
          for (int i = 0; i < STEPS; i++) {
            p = vec3(f, z);
            p.xz = p.xz * wob;
            p = uRot * p;
            vec3 q = p;
            q.y += centerShift;
            d = 0.1 + 0.2 * abs(sdPyramidUpInv(q));
            z -= d;
            o += (sin((p.y + z) * cf + vec4(0.0, 1.0, 2.0, 3.0)) + 1.0) / d;
          }
          o = tanh4(o * o * (uGlow * uBloom) / 1e5);
          vec3 col = o.rgb;
          float n = rand(gl_FragCoord.xy + vec2(iTime));
          col += (n - 0.5) * uNoise;
          col = clamp(col, 0.0, 1.0);
          float L = dot(col, vec3(0.2126, 0.7152, 0.0722));
          col = clamp(mix(vec3(L), col, uSaturation), 0.0, 1.0);
          if(abs(uHueShift) > 0.0001){ col = clamp(hueRotation(uHueShift) * col, 0.0, 1.0); }
          gl_FragColor = vec4(col, o.a);
        }
      `;

      const geometry = new Triangle(gl);
      const iResBuf = new Float32Array(2);
      const offsetPxBuf = new Float32Array(2);
      const program = new Program(gl, {
        vertex, fragment,
        uniforms: {
          iResolution: { value: iResBuf },
          iTime: { value: 0 },
          uHeight: { value: H },
          uBaseHalf: { value: BASE_HALF },
          uUseBaseWobble: { value: 1 },
          uRot: { value: new Float32Array([1,0,0, 0,1,0, 0,0,1]) },
          uGlow: { value: GLOW },
          uOffsetPx: { value: offsetPxBuf },
          uNoise: { value: NOISE },
          uSaturation: { value: SAT },
          uScale: { value: SCALE },
          uHueShift: { value: HUE },
          uColorFreq: { value: CFREQ },
          uBloom: { value: BLOOM },
          uCenterShift: { value: H * 0.25 },
          uInvBaseHalf: { value: 1 / BASE_HALF },
          uInvHeight: { value: 1 / H },
          uMinAxis: { value: Math.min(BASE_HALF, H) },
          uPxScale: { value: 1 / ((gl.drawingBufferHeight || 1) * 0.1 * SCALE) },
          uTimeScale: { value: TS }
        }
      });
      const mesh = new Mesh(gl, { geometry, program });

      /* ---------- 尺寸适配（容器全屏 fixed，用 window resize） ---------- */
      const resize = () => {
        const w = container.clientWidth || window.innerWidth || 1;
        const h = container.clientHeight || window.innerHeight || 1;
        renderer.setSize(w, h);
        iResBuf[0] = gl.drawingBufferWidth;
        iResBuf[1] = gl.drawingBufferHeight;
        offsetPxBuf[0] = offX * dpr;
        offsetPxBuf[1] = offY * dpr;
        program.uniforms.uPxScale.value = 1 / ((gl.drawingBufferHeight || 1) * 0.1 * SCALE);
      };
      window.addEventListener('resize', resize);
      resize();

      /* ---------- 渲染循环（rotate 模式：uRot 单位矩阵，wobble 做动画） ---------- */
      const rotBuf = new Float32Array(9);
      const t0 = performance.now();
      const render = (t) => {
        const time = (t - t0) * 0.001;
        program.uniforms.iTime.value = time;
        rotBuf[0]=1; rotBuf[1]=0; rotBuf[2]=0;
        rotBuf[3]=0; rotBuf[4]=1; rotBuf[5]=0;
        rotBuf[6]=0; rotBuf[7]=0; rotBuf[8]=1;
        program.uniforms.uRot.value = rotBuf;
        renderer.render({ scene: mesh });
        requestAnimationFrame(render);
      };
      requestAnimationFrame(render);
    }

    /* DOM 就绪后启动 Prism 背景 */
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', initPrism);
    }else{
      initPrism();
    }
  </script>

  <!-- ========== 主逻辑：地球 / 云层 / 光照 / 自转 / 跳转 ==========
       用普通 <script>（非 type=module），file:// 双击打开也能正常加载。
       globe.gl UMD 先加载并初始化地球（用内部打包的 three），
       再动态加载 three.js UMD 供云层代码使用，避免 ES module 在 file:// 下被 CORS 阻止。 -->
  <script>
    /* ---------- 等待 globe.gl 加载完成并初始化地球 ---------- */
    function initGlobe(){
      if(typeof Globe==='undefined'){
        setTimeout(initGlobe,50);
        return;
      }

      /* ---------- 地球初始化（纹理 + 凹凸贴图） ---------- */
      const world = new Globe(document.getElementById('globeViz'), { animateIn: false })
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png');

      /* ---------- 全屏尺寸适配 ---------- */
      world.width(window.innerWidth).height(window.innerHeight);

      /* ---------- 地球自动缓慢自转 ---------- */
      world.controls().autoRotate = true;
      world.controls().autoRotateSpeed = 0.35;

      /* ---------- 初始视角：完整全球视角 ----------
       * altitude 2.5 让地球完整显示在视口中，可看到整个地球。
       * 初始状态无任何区域高亮，地球缓慢自转。 */
      world.pointOfView({ lat: 20, lng: 105, altitude: 2.5 });

      /* ---------- 窗口尺寸变化时同步更新地球画布 ---------- */
      window.addEventListener('resize', () => {
        world.width(window.innerWidth).height(window.innerHeight);
      });

      /* ========== 「开始记录」按钮点击动画流程 ==========
       * 流程：停转 → 镜头过渡到中国(1.5s) → 跳转
       * 防重复点击：isAnimating 标志锁 */
      let isAnimating = false;

      document.getElementById('startBtn').addEventListener('click', () => {
        if(isAnimating) return;                        /* 动画进行中，忽略重复点击 */
        isAnimating = true;

        /* ① 停止地球默认自转 */
        world.controls().autoRotate = false;

        /* ② 镜头平滑过渡到中国全境（1.5秒缓动）
         * 中国经度 73~135，纬度 18~54，中心约 lat:36 lng:105
         * altitude 1.3 可完整展示中国版图，不裁切不偏移 */
        world.pointOfView({ lat: 36, lng: 105, altitude: 1.3 }, 1500);

        /* ③ 镜头过渡完成(1.5s)后，停留片刻让用户看清中国版图，再跳转 */
        setTimeout(() => {
          window.location.href = './index.html';
        }, 2800);  /* 1.5s 过渡 + 1.3s 停留 */
      });

      /* ---------- 动态加载 three.js UMD 供云层使用 ----------
       * globe.gl UMD 内部打包了 three.js 但不暴露全局 THREE。
       * 此处动态加载 three@0.149.0 UMD（最后稳定 UMD 版本），
       * 用于创建云层 Mesh/光照等。globe.gl 已初始化完毕，不受影响。 */
      function loadThreeScript(){
        if(typeof THREE!=='undefined'){ setupClouds(THREE); return; }
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js';
        s.onload=()=>setupClouds(THREE);
        s.onerror=()=>console.error('three.js UMD 加载失败，云层将不显示');
        document.head.appendChild(s);
      }

      /* ---------- 云层 + 补充光照（依赖 three.js） ---------- */
      function setupClouds(THREE){
        /* 补充光照：增强云层可见度与昼夜分界 */
        world.scene().add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1, 1, 1);
        world.scene().add(dirLight);

        /* 云层：独立球体包裹地球，独立旋转 */
        const CLOUDS_URLS = [
          'https://cdn.jsdelivr.net/gh/turban/webgl-earth@master/media/fair_clouds_4k.png',
          'https://raw.githubusercontent.com/turban/webgl-earth/master/media/fair_clouds_4k.png'
        ];
        const CLOUDS_ALT = 0.004;
        const CLOUDS_ROTATION_SPEED = -0.006;

        function loadClouds(urlIndex = 0) {
          if (urlIndex >= CLOUDS_URLS.length) return;
          new THREE.TextureLoader().load(
            CLOUDS_URLS[urlIndex],
            cloudsTexture => {
              const clouds = new THREE.Mesh(
                new THREE.SphereGeometry(world.getGlobeRadius() * (1 + CLOUDS_ALT), 75, 75),
                new THREE.MeshPhongMaterial({ map: cloudsTexture, transparent: true })
              );
              world.scene().add(clouds);
              (function rotateClouds() {
                clouds.rotation.y += CLOUDS_ROTATION_SPEED * Math.PI / 180;
                requestAnimationFrame(rotateClouds);
              })();
            },
            undefined,
            () => loadClouds(urlIndex + 1)
          );
        }
        loadClouds();
      }

      /* 地球初始化完成后，加载 three.js 用于云层 */
      loadThreeScript();
    }

    /* DOM 就绪后启动 */
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded',initGlobe);
    }else{
      initGlobe();
    }
  </script>
</body>
</html>
