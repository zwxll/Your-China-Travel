# ============================================================
# Nginx 配置文件 —— 「记录我的中国行」单页应用本地/局域网部署
# 部署修改点：
#   1. root 指向 index.html 所在目录（按实际路径修改）
#   2. 开启 gzip 压缩，降低 322KB 单文件传输体积
#   3. 静态回退 try_files，避免刷新 404
#   4. 外部 CDN 依赖（ECharts/地图数据/字体）无需服务端处理
# ============================================================

server {
    listen       80;
    server_name  _;              # 匹配所有 Host，局域网 IP 访问可用
    charset      utf-8;

    # 【修改点】root 改为 index.html 实际存放的绝对路径
    # Windows 示例：  root  F:/trae/1/deploy;
    # Linux 示例：    root  /var/www/china-travel;
    root  /usr/share/nginx/html;
    index index.html;

    # ---------- gzip 压缩（大幅降低首屏传输体积）----------
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;
    gzip_vary on;
    gzip_proxied any;

    # ---------- 主页面：单文件 HTML，禁用强缓存便于更新 ----------
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # ---------- 静态回退：任意路径均回 index.html，杜绝刷新 404 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 安全头 ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 单页大文件传输优化 ----------
    client_max_body_size 20m;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
}
